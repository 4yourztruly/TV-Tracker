<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <title>TV Tracker</title>

    <!--
      Content-Security-Policy: since this is a static SPA with no backend
      and holds a live Google access token in memory, the main realistic
      risk is XSS. This restricts script/connect sources to only what
      the app actually needs (self, Google auth/APIs, TMDB, AniList).
      GitHub Pages doesn't support custom HTTP headers, so this is set
      via a meta tag instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self' https://accounts.google.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://image.tmdb.org https://s4.anilist.co https:;
        connect-src 'self' https://www.googleapis.com https://accounts.google.com https://api.themoviedb.org https://graphql.anilist.co https://www.omdbapi.com;
        frame-src https://accounts.google.com;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';"
    />

    <!--
      Safari (desktop and iOS) doesn't support SVG favicons, so the
      svg-only link alone leaves the tab blank there — an .ico plus
      sized PNG fallbacks cover it and every other browser/PWA
      context (iOS home-screen icon, Android launcher, etc).
    -->
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <script type="module" crossorigin src="/TV-Tracker/assets/index-SUks7Iut.js"></script>
    <link rel="stylesheet" crossorigin href="/TV-Tracker/assets/index-BgKvRysR.css">
  <link rel="manifest" href="/TV-Tracker/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/TV-Tracker/registerSW.js"></script></head>
  <body>
    <div id="root"></div>
  </body>
</html>
