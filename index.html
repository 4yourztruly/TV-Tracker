<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <title>TV Tracker</title>

    <!--
      Content-Security-Policy: since this is a static SPA with no backend
      and holds a live Google access token in memory, the main realistic
      risk is XSS. This restricts script/connect sources to only what
      the app actually needs (self, Google auth/APIs, TMDB, Jikan).
      GitHub Pages doesn't support custom HTTP headers, so this is set
      via a meta tag instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self' https://accounts.google.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://image.tmdb.org https://cdn.myanimelist.net https:;
        connect-src 'self' https://www.googleapis.com https://accounts.google.com https://api.themoviedb.org https://api.jikan.moe;
        frame-src https://accounts.google.com;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';"
    />

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
